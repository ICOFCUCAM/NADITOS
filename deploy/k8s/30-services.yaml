# Deployments + Services for every Go microservice.
# Image references assume CI pushes <registry>/naditos-<service>:<sha>.
# Replace REGISTRY with your container registry.

# ─── Helper macro (rendered out per service) ─────────────────────────────
# Each block follows the same shape; we keep them inline so a kubectl apply
# of this file alone stands up the mesh.

apiVersion: apps/v1
kind: Deployment
metadata: { name: auth, namespace: naditos }
spec:
  replicas: 2
  selector: { matchLabels: { app: auth } }
  template:
    metadata: { labels: { app: auth } }
    spec:
      containers:
        - name: auth
          image: REGISTRY/naditos-auth:latest
          ports: [{ containerPort: 8001 }]
          envFrom:
            - configMapRef: { name: naditos-config }
            - secretRef:    { name: naditos-secrets }
          env: [{ name: SERVICE_PORT, value: "8001" }]
          readinessProbe: { httpGet: { path: /healthz, port: 8001 }, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /livez,   port: 8001 }, periodSeconds: 10 }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: auth, namespace: naditos }
spec:
  selector: { app: auth }
  ports: [{ port: 8001, targetPort: 8001 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: registry, namespace: naditos }
spec:
  replicas: 3
  selector: { matchLabels: { app: registry } }
  template:
    metadata: { labels: { app: registry } }
    spec:
      containers:
        - name: registry
          image: REGISTRY/naditos-registry:latest
          ports: [{ containerPort: 8002 }]
          envFrom:
            - configMapRef: { name: naditos-config }
            - secretRef:    { name: naditos-secrets }
          env: [{ name: SERVICE_PORT, value: "8002" }]
          readinessProbe: { httpGet: { path: /healthz, port: 8002 }, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /livez,   port: 8002 }, periodSeconds: 10 }
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: registry, namespace: naditos }
spec:
  selector: { app: registry }
  ports: [{ port: 8002, targetPort: 8002 }]
---
