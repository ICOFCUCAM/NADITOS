# All client traffic enters via the NADITOS gateway service. The gateway
# does JWT verification, per-tenant rate limiting, request-id injection,
# CORS, structured logging, and reverse proxies to the right upstream.
#
# In production layer a real WAF + LB in front (Cloud Armor / Cloudflare /
# sovereign equivalent). Per-service Ingresses should NOT be exposed.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: naditos-api
  namespace: naditos
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.naditos.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: gateway, port: { number: 8080 } } }
