# Minimal Ingress that fronts the Go services. In production swap for an
# API gateway (Kong / Envoy / Traefik) with auth verification, rate limits,
# WAF, and per-tenant routing.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: naditos-api
  namespace: naditos
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.naditos.example
      http:
        paths:
          - path: /v1/auth
            pathType: Prefix
            backend: { service: { name: auth,     port: { number: 8001 } } }
          - path: /v1/admin/users
            pathType: Prefix
            backend: { service: { name: auth,     port: { number: 8001 } } }
          - path: /v1/vehicles
            pathType: Prefix
            backend: { service: { name: registry, port: { number: 8002 } } }
          - path: /v1/fines
            pathType: Prefix
            backend: { service: { name: fines,    port: { number: 8006 } } }
          - path: /v1/audit
            pathType: Prefix
            backend: { service: { name: audit,    port: { number: 8007 } } }
